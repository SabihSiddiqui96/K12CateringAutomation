trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: 20.x
  BASE_URL: https://qa.primeroedge.co
  LOGIN_PATH: /login.aspx

stages:
  - stage: Deploy_QA
    displayName: Deploy to QA
    jobs:
      - job: Deploy
        displayName: Deploy application to QA
        steps:
          - checkout: self
          - script: echo "Deploying application to QA..."
            displayName: Deploy app to QA

  - stage: Run_Playwright_QA
    displayName: Run Playwright smoke tests on QA
    dependsOn: Deploy_QA
    condition: succeeded()
    jobs:
      - job: PlaywrightTests
        displayName: Playwright smoke tests
        timeoutInMinutes: 120
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js

          - script: npm ci
            displayName: Install npm packages

          - script: npx playwright install --with-deps chromium
            displayName: Install Playwright browsers

          - script: |
              echo "Checking QA login reachability..."
              curl -I --location --max-time 30 "$(BASE_URL)$(LOGIN_PATH)"
            displayName: Check QA login reachability

          - script: |
              curl -X POST "$(RINGCENTRAL_WEBHOOK_URL)" \
                -H "Content-Type: application/json" \
                -d "{\"text\":\"K12Catering Automation started.\n\nMonitor: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)\"}" || true
            displayName: Notify RingCentral - Started
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)

          - script: npx playwright test --workers=1
            displayName: Run Playwright tests
            env:
              CI: true
              BASE_URL: $(BASE_URL)
              PE_USERNAME: $(PE_USERNAME)
              ENCRYPTED_PASSWORD: $(ENCRYPTED_PASSWORD)
              ENCRYPTION_KEY: $(ENCRYPTION_KEY)
              PE_DISTRICT_EMAIL: $(PE_DISTRICT_EMAIL)
              PE_DISTRICT_ENCRYPTED_PASSWORD: $(PE_DISTRICT_ENCRYPTED_PASSWORD)
              K12_CUSTOMER_EMAIL: $(K12_CUSTOMER_EMAIL)
              K12_CUSTOMER_ENCRYPTED_PASSWORD: $(K12_CUSTOMER_ENCRYPTED_PASSWORD)
              DIRECT_K12_LOGIN: $(DIRECT_K12_LOGIN)
              LOGIN_PATH: $(LOGIN_PATH)
              K12_CATERING_URL: $(K12_CATERING_URL)
              DISTRICT_NAME: $(DISTRICT_NAME)
              SECONDARY_DISTRICT_NAME: $(SECONDARY_DISTRICT_NAME)
              ENVIRONMENT_LABEL: $(ENVIRONMENT_LABEL)
              PE_UAT_DISTRICT_EMAIL: $(PE_UAT_DISTRICT_EMAIL)
              PE_UAT_DISTRICT_ENCRYPTED_PASSWORD: $(PE_UAT_DISTRICT_ENCRYPTED_PASSWORD)
              K12_UATCUSTOMER_EMAIL: $(K12_UATCUSTOMER_EMAIL)
              K12_UATCUSTOMER_ENCRYPTED_PASSWORD: $(K12_UATCUSTOMER_ENCRYPTED_PASSWORD)

          - script: mkdir -p playwright-report test-results
            displayName: Ensure report artifact folders exist
            condition: succeededOrFailed()

          - task: PublishTestResults@2
            displayName: Publish JUnit test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: test-results/results.xml
              failTaskOnFailedTests: true
              testRunTitle: Playwright QA Smoke

          - task: PublishPipelineArtifact@1
            displayName: Publish Playwright HTML report
            condition: succeededOrFailed()
            inputs:
              targetPath: playwright-report
              artifact: playwright-report
              publishLocation: pipeline

          - task: PublishPipelineArtifact@1
            displayName: Publish test artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: test-results
              artifact: playwright-test-results
              publishLocation: pipeline

  - stage: Notify
    displayName: Send consolidated notification
    dependsOn: Run_Playwright_QA
    condition: always()
    jobs:
      - job: SendWebhook
        displayName: Send RingCentral notification
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download test results
            condition: always()
            continueOnError: true
            inputs:
              artifact: playwright-test-results
              path: test-results

          - script: |
              node -e "
              const fs = require('fs');
              const https = require('https');
              const url = require('url');

              let total = 0, passed = 0, failed = 0;

              function walkSuite(suite) {
                for (const spec of (suite.specs || [])) {
                  for (const test of (spec.tests || [])) {
                    total++;
                    const results = test.results || [];
                    if (results.some(r => r.status === 'passed')) passed++;
                    else if (results.some(r => ['failed', 'timedOut', 'interrupted'].includes(r.status))) failed++;
                  }
                }
                for (const child of (suite.suites || [])) walkSuite(child);
              }

              const resultsPath = 'test-results/results.json';
              if (fs.existsSync(resultsPath)) {
                const data = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
                (data.suites || []).forEach(walkSuite);
              }

              const pipelineUrl = process.env.COLLECTION_URI
                + process.env.TEAM_PROJECT
                + '/_build/results?buildId=' + process.env.BUILD_ID;
              const resultsUrl = pipelineUrl + '&view=ms.vss-test-web.build-test-results-tab';

              const text = total === 0
                ? 'K12Catering Automation completed. No test results were published.\n\nPipeline: ' + pipelineUrl
                : 'K12Catering Automation completed.\n\nPassed: ' + passed
                  + ' | Failed: ' + failed + ' | Total: ' + total
                  + '\n\nResults: ' + resultsUrl;

              console.log('Sending webhook:', text);

              const webhookUrl = process.env.RINGCENTRAL_WEBHOOK_URL;
              if (!webhookUrl) {
                console.log('No webhook URL; skipping.');
                process.exit(0);
              }

              const parsed = url.parse(webhookUrl);
              const body = JSON.stringify({ text });
              const options = {
                hostname: parsed.hostname,
                path: parsed.path,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, res => {
                console.log('Webhook sent, status:', res.statusCode);
              });
              req.on('error', e => {
                console.error('Webhook error:', e);
                process.exit(0);
              });
              req.write(body);
              req.end();
              "
            displayName: Send consolidated RingCentral notification
            condition: always()
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)
              COLLECTION_URI: $(System.CollectionUri)
              TEAM_PROJECT: $(System.TeamProject)
              BUILD_ID: $(Build.BuildId)
