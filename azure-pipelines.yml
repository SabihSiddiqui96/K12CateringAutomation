# CI trigger disabled — builds are started manually (or by the schedule configured in Azure DevOps).
trigger: none

# Pick the target environment when you run the pipeline (Run pipeline -> Variables/Parameters).
# QA is the default, so scheduled/nightly runs keep hitting QA unchanged. Choose UAT to run
# the same suite against the Release/UAT environment.
parameters:
  - name: targetEnv
    displayName: Target environment
    type: string
    default: QA
    values:
      - QA
      - UAT

pool:
  vmImage: ubuntu-latest

variables:
  - name: NODE_VERSION
    value: 20.x
  # Short label used in display names + webhook text (e.g. "QA" / "UAT").
  - name: ENV_LABEL
    value: ${{ parameters.targetEnv }}
  # BASE_URL + LOGIN_PATH are YAML-owned, so they flip safely with the parameter.
  # (The rest of the env-selection config is set on the test step further down.)
  - ${{ if eq(parameters.targetEnv, 'UAT') }}:
      - name: BASE_URL
        value: https://uatk12catering.perseusedge.com
      - name: LOGIN_PATH
        value: /login
  - ${{ else }}:
      - name: BASE_URL
        value: https://qa.primeroedge.co
      - name: LOGIN_PATH
        value: /login.aspx

stages:
  - stage: Deploy_QA
    displayName: Deploy to ${{ parameters.targetEnv }}
    jobs:
      - job: Deploy
        displayName: Deploy application to ${{ parameters.targetEnv }}
        steps:
          - checkout: self
          - script: echo "Deploying application to ${{ parameters.targetEnv }}..."
            displayName: Deploy app to ${{ parameters.targetEnv }}

  - stage: Run_Playwright_QA
    displayName: Run Playwright smoke tests on ${{ parameters.targetEnv }}
    dependsOn: Deploy_QA
    condition: succeeded()
    jobs:
      - job: PlaywrightTests
        displayName: Playwright smoke tests
        timeoutInMinutes: 120
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js

          - script: npm ci
            displayName: Install npm packages

          - script: npx playwright install --with-deps chrome
            displayName: Install Playwright browsers

          - script: |
              echo "Checking ${{ parameters.targetEnv }} login reachability..."
              curl -I --location --max-time 30 "$(BASE_URL)$(LOGIN_PATH)"
            displayName: Check ${{ parameters.targetEnv }} login reachability

          - script: |
              curl -X POST "$(RINGCENTRAL_WEBHOOK_URL)" \
                -H "Content-Type: application/json" \
                -d "{\"text\":\"K12Catering $(ENV_LABEL) Automation started.\n\nMonitor: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)\"}" || true
            displayName: Notify RingCentral - Started
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)

          - script: npx playwright test --workers=1
            displayName: Run Playwright tests (${{ parameters.targetEnv }})
            env:
              CI: true
              BASE_URL: $(BASE_URL)
              LOGIN_PATH: $(LOGIN_PATH)
              # --- Environment-selection config (compile-time by targetEnv) ---
              # Set as literals for UAT so a stale QA pipeline variable can't override
              # them; for QA, keep reading the existing pipeline/library variables.
              ${{ if eq(parameters.targetEnv, 'UAT') }}:
                # Main PrimeroEdge login (loginToPrimeroEdge) — UAT uses a DIFFERENT
                # admin account than QA, so these must come from UAT-specific vars.
                PE_USERNAME: $(PE_UAT_USERNAME)
                ENCRYPTED_PASSWORD: $(PE_UAT_ENCRYPTED_PASSWORD)
                K12_CATERING_URL: https://uatk12catering.perseusedge.com
                DIRECT_K12_LOGIN: 'true'
                DISTRICT_NAME: "Lee's Summit R-7"
                SECONDARY_DISTRICT_NAME: Alief ISD
                DATA_SYNC_PRIMARY_DISTRICT: "Lee's Summit R-7"
                DATA_SYNC_TARGET_DISTRICT: sabihLocal
                ENVIRONMENT_LABEL: UAT (PrimeroEdge)
              ${{ else }}:
                PE_USERNAME: $(PE_USERNAME)
                ENCRYPTED_PASSWORD: $(ENCRYPTED_PASSWORD)
                K12_CATERING_URL: $(K12_CATERING_URL)
                DIRECT_K12_LOGIN: $(DIRECT_K12_LOGIN)
                DISTRICT_NAME: $(DISTRICT_NAME)
                SECONDARY_DISTRICT_NAME: $(SECONDARY_DISTRICT_NAME)
                ENVIRONMENT_LABEL: $(ENVIRONMENT_LABEL)
              # --- Secrets / shared (from the pipeline variable group, both envs) ---
              # The suite picks QA-vs-UAT district/customer creds by DIRECT_K12_LOGIN.
              # ENCRYPTION_KEY is the SAME for both envs (it decrypts all the stored passwords).
              ENCRYPTION_KEY: $(ENCRYPTION_KEY)
              PE_DISTRICT_EMAIL: $(PE_DISTRICT_EMAIL)
              PE_DISTRICT_ENCRYPTED_PASSWORD: $(PE_DISTRICT_ENCRYPTED_PASSWORD)
              K12_CUSTOMER_EMAIL: $(K12_CUSTOMER_EMAIL)
              K12_CUSTOMER_ENCRYPTED_PASSWORD: $(K12_CUSTOMER_ENCRYPTED_PASSWORD)
              PE_UAT_DISTRICT_EMAIL: $(PE_UAT_DISTRICT_EMAIL)
              PE_UAT_DISTRICT_ENCRYPTED_PASSWORD: $(PE_UAT_DISTRICT_ENCRYPTED_PASSWORD)
              K12_UATCUSTOMER_EMAIL: $(K12_UATCUSTOMER_EMAIL)
              K12_UATCUSTOMER_ENCRYPTED_PASSWORD: $(K12_UATCUSTOMER_ENCRYPTED_PASSWORD)
              qaSchoolCafeEmail: $(qaSchoolCafeEmail)
              qaSchoolCafePassword: $(qaSchoolCafePassword)
              SCHOOLCAFE_URL: $(SCHOOLCAFE_URL)

          - script: mkdir -p playwright-report test-results
            displayName: Ensure report artifact folders exist
            condition: succeededOrFailed()

          - task: PublishTestResults@2
            displayName: Publish JUnit test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: test-results/results.xml
              failTaskOnFailedTests: true
              testRunTitle: Playwright QA Smoke

          - task: PublishPipelineArtifact@1
            displayName: Publish Playwright HTML report
            condition: succeededOrFailed()
            inputs:
              targetPath: playwright-report
              artifact: playwright-report
              publishLocation: pipeline

          - task: PublishPipelineArtifact@1
            displayName: Publish test artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: test-results
              artifact: playwright-test-results
              publishLocation: pipeline

  - stage: Notify
    displayName: Send consolidated notification
    dependsOn: Run_Playwright_QA
    condition: always()
    variables:
      RUN_PLAYWRIGHT_RESULT: $[ stageDependencies.Run_Playwright_QA.PlaywrightTests.result ]
    jobs:
      - job: SendWebhook
        displayName: Send RingCentral notification
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: Download test results
            condition: always()
            continueOnError: true
            inputs:
              artifact: playwright-test-results
              path: test-results

          - script: |
              node -e "
              const fs = require('fs');
              const https = require('https');
              const url = require('url');

              let total = 0, passed = 0, failed = 0, durationMs = 0;
              const runResult = (process.env.RUN_PLAYWRIGHT_RESULT || '').toLowerCase();

              const failedList = [];
              function walkSuite(suite, ancestors, file) {
                for (const spec of (suite.specs || [])) {
                  const fullTitle = [...ancestors, spec.title].filter(Boolean).join(' › ');
                  for (const test of (spec.tests || [])) {
                    total++;
                    const results = test.results || [];
                    if (results.some(r => r.status === 'passed')) passed++;
                    else if (results.some(r => ['failed', 'timedOut', 'interrupted'].includes(r.status))) {
                      failed++;
                      failedList.push({ file: spec.file || file || '', title: fullTitle });
                    }
                  }
                }
                for (const child of (suite.suites || [])) {
                  walkSuite(child, [...ancestors, child.title].filter(Boolean), file);
                }
              }

              const resultsPath = 'test-results/results.json';
              if (fs.existsSync(resultsPath)) {
                const data = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
                (data.suites || []).forEach(s => walkSuite(s, [], s.file || s.title || ''));
                durationMs = (data.stats && data.stats.duration) || 0;
              }

              const pct = n => (total ? Math.round(n / total * 100) : 0);
              const totalSecs = Math.round(durationMs / 1000);
              const _mins = Math.floor(totalSecs / 60);
              const duration = _mins >= 60
                ? Math.floor(_mins / 60) + 'h ' + (_mins % 60) + 'm'
                : _mins + 'm ' + (totalSecs % 60) + 's';

              // Short, readable label per failed test: ticket tag from the file
              // (t-113438.spec.ts -> T-113438) + the test title, since one file
              // can hold several tests.
              function tagFor(file) {
                const base = (file || '').split(/[\\/]/).pop().replace(/\.spec\.(ts|js)$/i, '');
                const m = base.match(/t-?(\d+)/i);
                return m ? ('T-' + m[1]) : (base || 'test');
              }
              // Group failures by ticket tag (one tag per spec file). One failure
              // in a file -> just the tag (e.g. '• T-113438'); several -> the tag
              // then each failing test title indented underneath.
              let failedSection = '';
              if (failed > 0 && failedList.length) {
                const order = [];
                const byTag = new Map();
                for (const f of failedList) {
                  const tag = tagFor(f.file);
                  if (!byTag.has(tag)) { byTag.set(tag, []); order.push(tag); }
                  byTag.get(tag).push(f.title);
                }
                const lines = [];
                for (const tag of order) {
                  const titles = byTag.get(tag);
                  if (titles.length === 1) lines.push('• ' + tag);
                  else { lines.push('• ' + tag + ':'); titles.forEach(t => lines.push('    - ' + t)); }
                }
                failedSection = '\n\nFailed Tests:\n' + lines.join('\n');
              }

              const pipelineUrl = process.env.COLLECTION_URI
                + process.env.TEAM_PROJECT
                + '/_build/results?buildId=' + process.env.BUILD_ID;
              const resultsUrl = pipelineUrl + '&view=ms.vss-test-web.build-test-results-tab';

              // Env label (e.g. 'QA ' / 'UAT ') so the channel can tell runs apart.
              const envLabel = process.env.ENV_LABEL ? process.env.ENV_LABEL + ' ' : '';

              let text;
              if (runResult === 'canceled' || runResult === 'cancelled') {
                text = 'K12Catering ' + envLabel + 'Automation was canceled before test results were published.\n\nPipeline: ' + pipelineUrl;
              } else if (total === 0) {
                text = 'K12Catering ' + envLabel + 'Automation ended before test results were published.\n\nPipeline: ' + pipelineUrl;
              } else {
                text = 'K12Catering ' + envLabel + 'Automation completed. See results below.\n\n'
                  + '✅ ' + 'Passed:'.padEnd(10) + passed + ' (' + pct(passed) + '%)\n'
                  + '❌ ' + 'Failed:'.padEnd(10) + failed + ' (' + pct(failed) + '%)\n'
                  + '📊 ' + 'Total:'.padEnd(10) + total + '\n'
                  + '⏱ ' + 'Duration:'.padEnd(10) + duration
                  + failedSection
                  + '\n\nResults: ' + resultsUrl;
              }

              console.log('Sending webhook:', text);

              const webhookUrl = process.env.RINGCENTRAL_WEBHOOK_URL;
              if (!webhookUrl) {
                console.log('No webhook URL; skipping.');
                process.exit(0);
              }

              const parsed = url.parse(webhookUrl);
              const body = JSON.stringify({ text });
              const options = {
                hostname: parsed.hostname,
                path: parsed.path,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, res => {
                console.log('Webhook sent, status:', res.statusCode);
              });
              req.on('error', e => {
                console.error('Webhook error:', e);
                process.exit(0);
              });
              req.write(body);
              req.end();
              "
            displayName: Send consolidated RingCentral notification
            condition: always()
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)
              COLLECTION_URI: $(System.CollectionUri)
              TEAM_PROJECT: $(System.TeamProject)
              BUILD_ID: $(Build.BuildId)
              RUN_PLAYWRIGHT_RESULT: $(RUN_PLAYWRIGHT_RESULT)
              ENV_LABEL: $(ENV_LABEL)
