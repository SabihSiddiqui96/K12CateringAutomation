trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  BASE_URL: 'https://qa.primeroedge.co'

stages:
  - stage: Deploy_QA
    displayName: Deploy to QA
    jobs:
      - job: Deploy
        displayName: Deploy application to QA
        steps:
          - checkout: self
          - script: echo "Deploying application to QA..."
            displayName: Deploy app to QA

  - stage: Run_Playwright_QA
    displayName: Run Playwright smoke tests on QA
    dependsOn: Deploy_QA
    condition: succeeded()
    jobs:
      - job: PlaywrightTests
        displayName: Playwright smoke tests
        timeoutInMinutes: 30
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: Install Node.js

          - script: npm ci
            displayName: Install npm packages

          - script: npx playwright install --with-deps
            displayName: Install Playwright browsers

          - script: |
              curl --fail-with-body -X POST "$(RINGCENTRAL_WEBHOOK_URL)" \
                -H "Content-Type: application/json" \
                -d '{
                  "text": "Initial run started for K12Catering Automation.\nSee: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId) to monitor the run."
                }'
            displayName: Notify RingCentral - Started
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)

          - script: npm run test:e2e:qa
            displayName: Run Playwright tests
            env:
              BASE_URL: $(BASE_URL)
              PE_USERNAME: $(PE_USERNAME)
              ENCRYPTED_PASSWORD: $(ENCRYPTED_PASSWORD)
              ENCRYPTION_KEY: $(ENCRYPTION_KEY)
              HEADLESS: 'true'

          - task: PublishTestResults@2
            displayName: Publish JUnit test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/results.xml'
              failTaskOnFailedTests: true
              testRunTitle: 'Playwright QA Smoke'

          - task: PublishPipelineArtifact@1
            displayName: Publish Playwright HTML report
            condition: succeededOrFailed()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: Publish traces and other test artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: 'test-results'
              artifact: 'playwright-test-results'
              publishLocation: 'pipeline'

          - script: |
              node -e "
              const fs = require('fs');
              const path = 'test-results/results.json';

              let total = 0;
              let passed = 0;
              let failed = 0;
              let firstError = '';

              function clean(text) {
                return String(text || '')
                  .replace(/\r?\n/g, ' | ')
                  .replace(/\"/g, '')
                  .replace(/'/g, '')
                  .replace(/[{}[\]]/g, '')
                  .replace(/\s+/g, ' ')
                  .trim()
                  .slice(0, 500);
              }

              function captureError(result) {
                if (!result || firstError) return;

                if (result.error && result.error.message) {
                  firstError = clean(result.error.message);
                  return;
                }

                if (Array.isArray(result.errors) && result.errors.length) {
                  const msg =
                    result.errors[0]?.message ||
                    result.errors[0]?.value ||
                    JSON.stringify(result.errors[0]);
                  firstError = clean(msg);
                }
              }

              function walkSuite(suite) {
                if (suite.specs) {
                  for (const spec of suite.specs) {
                    for (const test of (spec.tests || [])) {
                      total++;
                      const results = test.results || [];
                      const hasPassed = results.some(r => r.status === 'passed');
                      const hasFailed = results.some(r =>
                        ['failed', 'timedOut', 'interrupted'].includes(r.status)
                      );

                      if (hasPassed) passed++;
                      else if (hasFailed) failed++;

                      for (const result of results) {
                        captureError(result);
                      }
                    }
                  }
                }

                for (const child of (suite.suites || [])) {
                  walkSuite(child);
                }
              }

              if (fs.existsSync(path)) {
                const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                for (const suite of (data.suites || [])) {
                  walkSuite(suite);
                }
              }

              if (!firstError && failed > 0) {
                firstError = 'One or more tests failed. Open the test results link for details.';
              }

              console.log('##vso[task.setvariable variable=TEST_TOTAL]' + total);
              console.log('##vso[task.setvariable variable=TEST_PASSED]' + passed);
              console.log('##vso[task.setvariable variable=TEST_FAILED]' + failed);
              console.log('##vso[task.setvariable variable=TEST_ERROR]' + firstError);
              "
            displayName: Calculate Playwright totals and error
            condition: succeededOrFailed()

          - script: |
              curl --fail-with-body -X POST "$(RINGCENTRAL_WEBHOOK_URL)" \
                -H "Content-Type: application/json" \
                -d '{
                  "text": "✅ K12Catering Automation passed.\n\nPassed: $(TEST_PASSED) | Failed: $(TEST_FAILED) | Total: $(TEST_TOTAL)\n\n🔗 Results: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=ms.vss-test-web.build-test-results-tab"
                }'
            displayName: Notify RingCentral - Success
            condition: and(succeeded(), eq(variables['TEST_FAILED'], '0'))
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)

          - script: |
              curl --fail-with-body -X POST "$(RINGCENTRAL_WEBHOOK_URL)" \
                -H "Content-Type: application/json" \
                -d '{
                  "text": "❌ K12Catering Automation failed.\n\nPassed: $(TEST_PASSED) | Failed: $(TEST_FAILED) | Total: $(TEST_TOTAL)\n\nError: $(TEST_ERROR)\n\n🔗 Results: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)&view=ms.vss-test-web.build-test-results-tab"
                }'
            displayName: Notify RingCentral - Failed
            condition: or(failed(), ne(variables['TEST_FAILED'], '0'))
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)
