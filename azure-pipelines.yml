trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  BASE_URL: 'https://qa.primeroedge.co'

stages:
  # ─────────────────────────────────────────────
  # Stage 1 – Deploy
  # ─────────────────────────────────────────────
  - stage: Deploy_QA
    displayName: Deploy to QA
    jobs:
      - job: Deploy
        displayName: Deploy application to QA
        steps:
          - checkout: self
          - script: echo "Deploying application to QA..."
            displayName: Deploy app to QA

  # ─────────────────────────────────────────────
  # Stage 2 – Run tests (4 parallel shards)
  #   • NO webhook here anymore
  #   • Each shard saves a summary JSON artifact
  # ─────────────────────────────────────────────
  - stage: Run_Playwright_QA
    displayName: Run Playwright smoke tests on QA
    dependsOn: Deploy_QA
    condition: succeeded()
    jobs:
      - job: PlaywrightTests
        displayName: Playwright smoke tests (Shard $(System.JobPositionInPhase)/4)
        timeoutInMinutes: 30
        strategy:
          parallel: 4

        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: Install Node.js

          - script: npm ci
            displayName: Install npm packages

          - script: npx playwright install --with-deps chromium
            displayName: Install Playwright browsers

          # ── Notify once that the run has started (shard 1 only) ──────────
          - script: |
              curl -X POST "$(RINGCENTRAL_WEBHOOK_URL)" \
                -H "Content-Type: application/json" \
                -d "{\"text\": \"🚀 K12Catering Automation started.\n\n🔗 Monitor: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)\"}" || true
            displayName: Notify RingCentral - Started
            condition: eq(variables['System.JobPositionInPhase'], '1')
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)

          # ── Run this shard's slice of tests ──────────────────────────────
          - script: |
              SHARD_IDX=$(System.JobPositionInPhase)
              SLEEP_SEC=$(( (SHARD_IDX - 1) * 20 ))
              if [ "$SLEEP_SEC" -gt 0 ]; then sleep "$SLEEP_SEC"; fi
              npx playwright test --shard=$(System.JobPositionInPhase)/4
            displayName: Run Playwright tests (Shard $(System.JobPositionInPhase)/4)
            env:
              CI: true
              BASE_URL: $(BASE_URL)
              PE_USERNAME: $(PE_USERNAME)
              ENCRYPTED_PASSWORD: $(ENCRYPTED_PASSWORD)
              ENCRYPTION_KEY: $(ENCRYPTION_KEY)
              PE_DISTRICT_EMAIL: $(PE_DISTRICT_EMAIL)
              PE_DISTRICT_ENCRYPTED_PASSWORD: $(PE_DISTRICT_ENCRYPTED_PASSWORD)
              K12_CUSTOMER_EMAIL: $(K12_CUSTOMER_EMAIL)
              K12_CUSTOMER_ENCRYPTED_PASSWORD: $(K12_CUSTOMER_ENCRYPTED_PASSWORD)

          # ── Write a per-shard summary so Stage 3 can merge them ──────────
          - script: |
              node -e "
              const fs = require('fs');
              const resultsPath = 'test-results/results.json';
              let total = 0, passed = 0, failed = 0;

              function walkSuite(suite) {
                for (const spec of (suite.specs || [])) {
                  for (const test of (spec.tests || [])) {
                    total++;
                    const results = test.results || [];
                    if (results.some(r => r.status === 'passed')) passed++;
                    else if (results.some(r => ['failed','timedOut','interrupted'].includes(r.status))) failed++;
                  }
                }
                for (const child of (suite.suites || [])) walkSuite(child);
              }

              if (fs.existsSync(resultsPath)) {
                const data = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
                (data.suites || []).forEach(walkSuite);
              }

              fs.mkdirSync('shard-summary', { recursive: true });
              fs.writeFileSync(
                'shard-summary/shard-' + process.env.SHARD_INDEX + '.json',
                JSON.stringify({ total, passed, failed })
              );
              console.log('Shard ' + process.env.SHARD_INDEX + ' summary:', { total, passed, failed });
              "
            displayName: Write shard summary
            condition: succeededOrFailed()
            env:
              SHARD_INDEX: $(System.JobPositionInPhase)

          - task: PublishTestResults@2
            displayName: Publish JUnit test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/results.xml'
              failTaskOnFailedTests: true
              testRunTitle: 'Playwright QA Smoke - Shard $(System.JobPositionInPhase)'

          - task: PublishPipelineArtifact@1
            displayName: Publish Playwright HTML report
            condition: succeededOrFailed()
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report-shard-$(System.JobPositionInPhase)'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: Publish test artifacts
            condition: succeededOrFailed()
            inputs:
              targetPath: 'test-results'
              artifact: 'playwright-test-results-shard-$(System.JobPositionInPhase)'
              publishLocation: 'pipeline'

          # ── Publish the shard summary for Stage 3 to consume ─────────────
          - task: PublishPipelineArtifact@1
            displayName: Publish shard summary
            condition: succeededOrFailed()
            inputs:
              targetPath: 'shard-summary'
              artifact: 'shard-summary-$(System.JobPositionInPhase)'
              publishLocation: 'pipeline'

  # ─────────────────────────────────────────────
  # Stage 3 – Consolidated webhook notification
  #   Runs after ALL shards finish (pass or fail)
  #   Downloads every shard-summary, totals them,
  #   then sends exactly ONE message.
  # ─────────────────────────────────────────────
  - stage: Notify
    displayName: Send consolidated notification
    dependsOn: Run_Playwright_QA
    condition: always()
    jobs:
      - job: SendWebhook
        displayName: Merge results and notify RingCentral
        steps:
          # Download all 4 shard summaries into ./shard-summaries/
          - task: DownloadPipelineArtifact@2
            displayName: Download shard summary 1
            condition: always()
            inputs:
              artifact: 'shard-summary-1'
              path: 'shard-summaries'

          - task: DownloadPipelineArtifact@2
            displayName: Download shard summary 2
            condition: always()
            inputs:
              artifact: 'shard-summary-2'
              path: 'shard-summaries'

          - task: DownloadPipelineArtifact@2
            displayName: Download shard summary 3
            condition: always()
            inputs:
              artifact: 'shard-summary-3'
              path: 'shard-summaries'

          - task: DownloadPipelineArtifact@2
            displayName: Download shard summary 4
            condition: always()
            inputs:
              artifact: 'shard-summary-4'
              path: 'shard-summaries'

          # Merge totals and send a single webhook message
          - script: |
              node -e "
              const fs   = require('fs');
              const https = require('https');
              const url   = require('url');

              // Merge all shard summaries
              let total = 0, passed = 0, failed = 0;
              const dir = 'shard-summaries';

              if (fs.existsSync(dir)) {
                fs.readdirSync(dir).forEach(file => {
                  if (!file.endsWith('.json')) return;
                  try {
                    const s = JSON.parse(fs.readFileSync(dir + '/' + file, 'utf8'));
                    total  += (s.total  || 0);
                    passed += (s.passed || 0);
                    failed += (s.failed || 0);
                  } catch(e) {
                    console.warn('Could not parse', file, e.message);
                  }
                });
              }

              const buildUrl = process.env.COLLECTION_URI
                + process.env.TEAM_PROJECT
                + '/_build/results?buildId=' + process.env.BUILD_ID
                + '&view=ms.vss-test-web.build-test-results-tab';

              let text;
              if (total === 0) {
                text = '⚠️ K12Catering Automation — Pipeline Error (no test results found).\n\n🔗 Pipeline: '
                     + process.env.COLLECTION_URI + process.env.TEAM_PROJECT
                     + '/_build/results?buildId=' + process.env.BUILD_ID;
              } else if (failed === 0) {
                text = '✅ K12Catering Automation — All Tests Passed.\n\nPassed: ' + passed
                     + ' | Failed: ' + failed + ' | Total: ' + total
                     + '\n\n🔗 Results: ' + buildUrl;
              } else {
                text = '❌ K12Catering Automation — Tests Failed.\n\nPassed: ' + passed
                     + ' | Failed: ' + failed + ' | Total: ' + total
                     + '\n\n🔗 Results: ' + buildUrl;
              }

              console.log('Sending webhook:', text);

              const webhookUrl = process.env.RINGCENTRAL_WEBHOOK_URL;
              if (!webhookUrl) { console.log('No webhook URL — skipping.'); process.exit(0); }

              const parsed  = url.parse(webhookUrl);
              const body    = JSON.stringify({ text });
              const options = {
                hostname: parsed.hostname,
                path:     parsed.path,
                method:   'POST',
                headers:  {
                  'Content-Type':   'application/json',
                  'Content-Length': Buffer.byteLength(body)
                }
              };

              const req = https.request(options, res => {
                console.log('Webhook sent, status:', res.statusCode);
              });
              req.on('error', e => { console.error('Webhook error:', e); process.exit(0); });
              req.write(body);
              req.end();
              "
            displayName: Send consolidated RingCentral notification
            condition: always()
            env:
              RINGCENTRAL_WEBHOOK_URL: $(RINGCENTRAL_WEBHOOK_URL)
              COLLECTION_URI: $(System.CollectionUri)
              TEAM_PROJECT: $(System.TeamProject)
              BUILD_ID: $(Build.BuildId)