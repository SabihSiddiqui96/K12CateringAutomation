userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

browsers:
  - browser: chrome
    browser_version: latest
    os: Windows
    os_version: 11

testFramework:
  name: playwright

parallelsPerPlatform: 1
browserstackLocal: false

buildName: K12Catering-QA-TestAutomation
projectName: K12Catering-QA-TestAutomation

env:
  BASE_URL: ${BASE_URL}
  PE_USERNAME: ${PE_USERNAME}
  ENCRYPTED_PASSWORD: ${ENCRYPTED_PASSWORD}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  PE_DISTRICT_EMAIL: ${PE_DISTRICT_EMAIL}
  PE_DISTRICT_ENCRYPTED_PASSWORD: ${PE_DISTRICT_ENCRYPTED_PASSWORD}
