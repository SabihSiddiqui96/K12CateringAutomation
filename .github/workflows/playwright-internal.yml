name: Playwright Internal Reports

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  cancel-in-progress: false

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug BASE_URL reachability
        run: |
          echo "Testing BASE_URL..."
          curl -I -L --max-time 30 "$BASE_URL" || true
          echo ""
          echo "Testing simple fetch..."
          curl -L --max-time 30 "$BASE_URL" | head -n 20 || true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Debug BASE_URL host
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          u = urlparse(os.environ["BASE_URL"])
          print("Host:", u.hostname)
          print("Scheme:", u.scheme)
          PY
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Run Playwright tests
        id: playwright
        run: npm run test:e2e
        continue-on-error: true
        env:
          PE_USERNAME: ${{ secrets.PE_USERNAME }}
          FORCE_AUTH: ${{ secrets.FORCE_AUTH }}
          BASE_URL: ${{ secrets.BASE_URL }}
          ENCRYPTED_PASSWORD: ${{ secrets.ENCRYPTED_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report
            test-results
          retention-days: 30

      - name: Add workflow summary
        if: always()
        shell: bash
        run: |
          echo "# Playwright Internal Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repository: $GITHUB_REPOSITORY" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: $GITHUB_REF_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run number: $GITHUB_RUN_NUMBER" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- Download \`playwright-report-${GITHUB_RUN_NUMBER}\` from this run." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/results.json ]; then
            echo "## Results" >> "$GITHUB_STEP_SUMMARY"
            echo "- JSON results file found at \`test-results/results.json\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Results" >> "$GITHUB_STEP_SUMMARY"
            echo "- No JSON results file was found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1