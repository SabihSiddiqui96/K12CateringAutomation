name: Playwright Internal Reports

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: npm run test:e2e
        continue-on-error: true
        env:
          PE_USERNAME: ${{ secrets.PE_USERNAME }}
          FORCE_AUTH: ${{ secrets.FORCE_AUTH }}
          BASE_URL: ${{ secrets.BASE_URL }}
          ENCRYPTED_PASSWORD: ${{ secrets.ENCRYPTED_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Build summary from Playwright JSON
        if: always()
        shell: powershell
        run: |
          if (!(Test-Path "test-results/results.json")) {
            Add-Content $env:GITHUB_STEP_SUMMARY "# Playwright Internal Report"
            Add-Content $env:GITHUB_STEP_SUMMARY ""
            Add-Content $env:GITHUB_STEP_SUMMARY "- No results.json found."
            exit 0
          }

          $json = Get-Content "test-results/results.json" -Raw | ConvertFrom-Json

          $counts = @{
            total = 0
            passed = 0
            failed = 0
            skipped = 0
            flaky = 0
          }

          function Walk-Suite($suite) {
            if ($suite.specs) {
              foreach ($spec in $suite.specs) {
                if ($spec.tests) {
                  foreach ($test in $spec.tests) {
                    $counts.total++
                    $status = $null
                    if ($test.results -and $test.results.Count -gt 0) {
                      $status = $test.results[-1].status
                    } else {
                      $status = "skipped"
                    }

                    switch ($status) {
                      "passed" { $counts.passed++ }
                      "failed" { $counts.failed++ }
                      "skipped" { $counts.skipped++ }
                      "flaky"  { $counts.flaky++ }
                    }
                  }
                }
              }
            }

            if ($suite.suites) {
              foreach ($child in $suite.suites) {
                Walk-Suite $child
              }
            }
          }

          foreach ($suite in $json.suites) {
            Walk-Suite $suite
          }

          Add-Content $env:GITHUB_STEP_SUMMARY "# Playwright Internal Report"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "| Metric | Count |"
          Add-Content $env:GITHUB_STEP_SUMMARY "|---|---:|"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Total | $($counts.total) tests |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Passed | $($counts.passed) tests |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Failed | $($counts.failed) tests |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Flaky | $($counts.flaky) |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Skipped | $($counts.skipped) |"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "- Branch: $env:GITHUB_REF_NAME"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Run: $env:GITHUB_RUN_NUMBER"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Commit: $env:GITHUB_SHA"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report
            test-results
          retention-days: 30

      - name: Fail job if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1