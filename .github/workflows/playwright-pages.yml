name: Playwright Reports to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug BASE_URL reachability
        run: |
          echo "Testing BASE_URL..."
          curl -I -L --max-time 30 "$BASE_URL" || true
          echo ""
          echo "Testing simple fetch..."
          curl -L --max-time 30 "$BASE_URL" | head -n 20 || true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Debug BASE_URL host
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          u = urlparse(os.environ["BASE_URL"])
          print("Host:", u.hostname)
          print("Scheme:", u.scheme)
          PY
        env:
          BASE_URL: ${{ secrets.BASE_URL }}


      - name: Run Playwright tests
        run: npm run test:e2e
        continue-on-error: true
        env:
          PE_USERNAME: ${{ secrets.PE_USERNAME }}
          FORCE_AUTH: ${{ secrets.FORCE_AUTH }}
          BASE_URL: ${{ secrets.BASE_URL }}
          ENCRYPTED_PASSWORD: ${{ secrets.ENCRYPTED_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Restore previous published site
        if: always()
        run: |
          mkdir -p site
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add gh-pages-dir origin/gh-pages
            cp -R gh-pages-dir/* site/ || true
          fi

      - name: Build report site
        if: always()
        run: |
          RUN_ID=$(date -u +%Y-%m-%d_%H-%M-%S)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "GIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          npm run report:build-site

      - name: Add .nojekyll
        if: always()
        run: touch site/.nojekyll

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_number }}
          path: |
            playwright-report
            test-results

      - name: Prepare gh-pages history branch
        if: always()
        run: |
          cd site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Playwright report ${RUN_ID}" || echo "No changes to commit"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin gh-pages

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: always()
    needs: build
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4