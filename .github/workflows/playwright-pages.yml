name: Playwright Reports to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        continue-on-error: true
        env:
          PE_USERNAME2: ${{ secrets.PE_USERNAME2 }}
          FORCE_AUTH: ${{ secrets.FORCE_AUTH }}
          BASE_URL: ${{ secrets.BASE_URL }}
          ENCRYPTED_PASSWORD: ${{ secrets.ENCRYPTED_PASSWORD }}

      - name: Restore previous Pages content
        if: always()
        run: |
          mkdir -p site
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add gh-pages-dir origin/gh-pages
            cp -R gh-pages-dir/* site/ || true
          fi

      - name: Build report site
        if: always()
        run: |
          RUN_ID=$(date -u +%Y-%m-%d_%H-%M-%S)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "GIT_SHA=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "GIT_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          npm run report:build-site

      - name: Add .nojekyll
        if: always()
        run: touch site/.nojekyll

      - name: Publish to gh-pages
        if: always()
        run: |
          cd site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Playwright report ${RUN_ID}" || echo "No changes to commit"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force origin gh-pages